name: CI-CD VZeta

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vzeta-production
  cancel-in-progress: true

jobs:
  build-app:
    name: Construir y publicar aplicación
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v7

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push de myapp
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp_image:v1
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp_image:latest

  build-nginx:
    name: Construir y publicar NGINX
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v7

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push de NGINX
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mynginx_image:v1
            ${{ secrets.DOCKERHUB_USERNAME }}/mynginx_image:latest

  deploy:
    name: Desplegar ambos contenedores en EC2
    needs:
      - build-app
      - build-nginx
    runs-on: ubuntu-latest

    steps:
      - name: Actualizar contenedores mediante SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            APP_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/myapp_image:latest"
            NGINX_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/mynginx_image:latest"

            mkdir -p /home/ec2-user/vzeta-docker/data

            docker network inspect vzeta-net >/dev/null 2>&1 || \
              docker network create --driver bridge vzeta-net

            docker pull "$APP_IMAGE"
            docker pull "$NGINX_IMAGE"

            docker rm -f mynginx_container 2>/dev/null || true
            docker rm -f myapp_container 2>/dev/null || true

            docker run -d \
              --name myapp_container \
              --network vzeta-net \
              --restart unless-stopped \
              --mount type=bind,source=/home/ec2-user/vzeta-docker/data,target=/data \
              "$APP_IMAGE"

            docker run -d \
              --name mynginx_container \
              --network vzeta-net \
              --restart unless-stopped \
              -p 80:80 \
              "$NGINX_IMAGE"

            intento=1

            while [ "$intento" -le 10 ]; do
              if curl -fsS http://localhost/health; then
                echo
                echo "Despliegue VZeta completado correctamente"
                docker ps
                exit 0
              fi

              echo "Esperando aplicación: intento $intento de 10"
              sleep 3
              intento=$((intento + 1))
            done

            echo "La aplicación no respondió correctamente"
            docker logs myapp_container
            docker logs mynginx_container
            exit 1
